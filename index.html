<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jal Suraksha — Kutch</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#f5f5f5; margin:0;}
.nav {display:flex; background:#fff; border-bottom:1px solid #ccc;}
.nav div {flex:1; padding:10px; text-align:center; cursor:pointer;}
.nav .active {color:#185FA5; font-weight:bold;}

.page {display:none; padding:12px;}
.page.active {display:block;}

.box {background:#fff; padding:12px; margin-bottom:10px; border-radius:6px;}
input, select, textarea {width:100%; padding:8px; margin-top:6px;}
button {width:100%; padding:10px; margin-top:8px; background:#185FA5; color:#fff; border:none;}

.status {font-size:12px; margin-bottom:10px;}
.bad {color:red;} .ok {color:green;}
</style>
</head>

<body>

<div class="nav">
  <div onclick="show('form')" class="active">Collect</div>
  <div onclick="show('dashboard')">Dashboard</div>
  <div onclick="show('records')">Records</div>
</div>

<!-- FORM -->
<div id="form" class="page active">

<div class="box">
  <h3>Basic Info</h3>
  <select id="block">
    <option>Bhuj</option><option>Lakhpat</option><option>Mandvi</option>
  </select>
  <input id="village" placeholder="Village">
</div>

<div class="box">
  <h3>GPS</h3>
  <div id="gps">Not fetched</div>
  <button onclick="getGPS()">Fetch GPS</button>
</div>

<div class="box">
  <h3>Parameters</h3>
  <input id="tds" type="number" placeholder="TDS">
  <input id="ph" type="number" placeholder="pH">
</div>

<div class="box">
  <h3>Result</h3>
  <button onclick="setResult('fit')">Fit</button>
  <button onclick="setResult('unfit')">Unfit</button>
</div>

<button onclick="save()">Save</button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <div class="box">
    <h3>Total Samples</h3>
    <div id="total">0</div>
  </div>
</div>

<!-- RECORDS -->
<div id="records" class="page">
  <div class="box" id="list">No data</div>
  <button onclick="exportExcel()">Export Excel</button>
</div>

<script>
let gps = "";
let result = "";

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function getGPS(){
  if(!navigator.geolocation){
    alert("GPS not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos=>{
      gps = pos.coords.latitude + "," + pos.coords.longitude;
      document.getElementById("gps").innerText = gps;
    },
    err=>{
      alert("Allow location permission in app settings");
    },
    {enableHighAccuracy:true}
  );
}

function setResult(r){ result=r; }

function save(){
  let data = {
    block: document.getElementById("block").value,
    village: document.getElementById("village").value,
    tds: document.getElementById("tds").value,
    ph: document.getElementById("ph").value,
    gps: gps,
    result: result,
    time: new Date().toLocaleString()
  };

  let all = JSON.parse(localStorage.getItem("wq") || "[]");
  all.push(data);
  localStorage.setItem("wq", JSON.stringify(all));

  alert("Saved");
  loadDashboard();
  loadRecords();
}

function loadDashboard(){
  let all = JSON.parse(localStorage.getItem("wq") || "[]");
  document.getElementById("total").innerText = all.length;
}

function loadRecords(){
  let all = JSON.parse(localStorage.getItem("wq") || "[]");
  let html = "";

  all.reverse().forEach(d=>{
    html += "<div>"+d.village+" ("+d.block+") - "+d.result+"</div>";
  });

  document.getElementById("list").innerHTML = html || "No data";
}

function exportExcel(){
  let all = JSON.parse(localStorage.getItem("wq") || "[]");
  if(!all.length){alert("No data");return;}

  let ws = XLSX.utils.json_to_sheet(all);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Data");

  XLSX.writeFile(wb, "water.xlsx");
}

loadDashboard();
loadRecords();
</script>

</body>
</html>
